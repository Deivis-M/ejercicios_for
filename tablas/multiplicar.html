<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabla del 3</title>
  <link rel="stylesheet" href="multiplicar.css" />
</head>
<body>

  <main class="page">

    <button type="button" class="btn-probar">PROBAR</button>

    <section class="tabla-card">

        <h1 class="tabla-titulo">Tabla del 3</h1>

      <ul class="tabla-lista">
        <li class="tabla-fila"><span class="operacion">3 × 1</span><span class="resultado">3</span></li>

        <li class="tabla-fila"><span class="operacion">3 × 7</span><span class="resultado">21</span></li>
        <li class="tabla-fila"><span class="operacion">3 × 8</span><span class="resultado">24</span></li>
        <li class="tabla-fila"><span class="operacion">3 × 9</span><span class="resultado">27</span></li>
        <li class="tabla-fila"><span class="operacion">3 × 10</span><span class="resultado">30</span></li>

    </section>

    <footer class="page-footer">Creado por: <span class="page-footer-nombre">Deivis-M</span></footer>
